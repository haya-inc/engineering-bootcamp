services:
  app:
    build: .
    environment:
      PORT: "3000"
      MENTOR_ID: "m-001"
      DATABASE_URL: "postgres://bootcamp:bootcamp@db:5432/learning_log"
    ports:
      - "3000:3000"
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: bootcamp
      POSTGRES_PASSWORD: bootcamp
      POSTGRES_DB: learning_log
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
