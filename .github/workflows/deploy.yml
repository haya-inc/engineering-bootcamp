name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "textbook/book/**"
      - "textbook/glossary.md"
      - "README.md"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1つに絞る (進行中はキャンセルしない)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      # bun = package manager / vp(品質ゲート) の実行系。mise.toml と同一版に固定。
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # astro / split-book は node ランタイムで動く。patch まで固定し再現性を担保。
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "26.3.1"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # astro:content の型を生成してから型チェックする (本文を先に分割)
      - name: Generate content & Astro types
        run: |
          node scripts/split-book.mjs
          bunx astro sync

      # 品質ゲート (Vite+ = alpha なので check/test のみ。本番ビルドは下の脱出ハッチで vp 非依存)
      - name: Format & lint (oxfmt + oxlint)
        run: bunx vp check
      - name: Type check (astro check)
        run: bunx astro check
      - name: Test (vitest)
        run: bunx vp test run

      # 本番ビルドは vp を経由しない素のスクリプト (alpha ツールの単一点障害を避ける脱出ハッチ)
      - name: Build (split → astro build → pagefind)
        run: bun run build

      # 生成が無動作だと空サイトになるため、ページ数の下限を assert (split-book の exit1 と二重化)
      - name: Assert pages generated
        run: |
          tb=$(find dist/textbook -name index.html | wc -l)
          gl=$(find dist/glossary -name index.html | wc -l)
          vd=$(find dist/videos -name index.html | wc -l)
          echo "textbook=$tb glossary=$gl videos=$vd"
          test "$tb" -ge 28 || { echo "::error::textbook pages too few ($tb)"; exit 1; }
          test "$gl" -ge 24 || { echo "::error::glossary pages too few ($gl)"; exit 1; }
          test "$vd" -ge 25 || { echo "::error::videos pages too few ($vd)"; exit 1; }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
